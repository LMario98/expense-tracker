<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <h1>Expense Tracker</h1>

    <div id="summary">
        <div class="metric">
            <p>Entrate</p>
            <p id="total-income">€0</p>
        </div>
        <div class="metric">
            <p>Uscite</p>
            <p id="total-expense">€0</p>
        </div>
        <div class="metric">
            <p>Saldo</p>
            <p id="balance">€0</p>
        </div>
    </div>

    <div id="form-container">
        <input type="text" id="desc" placeholder="Descrizione..." />
        <input type="number" id="amount" placeholder="Importo €" />
        <select id="type">
            <option value="expense">Uscita</option>
            <option value="income">Entrata</option>
        </select>
        <button type="button" id="add-btn">Aggiungi</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
